name: Daily internship scan

on:
  schedule:
    - cron: "30 2 * * *"   # 02:30 UTC = 8:00 AM IST
  workflow_dispatch: {}     # manual "Run workflow" button

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run radar
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python radar.py
      - name: Commit results
        run: |
          git config user.name "internship-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/index.html seen.json
          git diff --cached --quiet || git commit -m "Daily scan $(date -u +%F)"
          git push
