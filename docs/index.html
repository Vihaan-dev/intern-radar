<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Radar</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px; background: #0d1117; color: #c9d1d9; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #58a6ff; }
        .status { padding: 10px; background: #21262d; border-radius: 6px; margin: 10px 0; }
        .loading { color: #79c0ff; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #30363d; }
        th { background: #21262d; color: #58a6ff; }
        tr:hover { background: #21262d; }
        .new { background: #238636; padding: 2px 6px; border-radius: 3px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Internship Radar</h1>
        <div class="status">
            <p class="loading">⏳ Loading latest results...</p>
        </div>
        <p>Your automated internship scanner runs every morning at 8:00 AM IST.</p>
        <p>Check back soon for results! The first run will generate your dashboard.</p>
    </div>
    <script>
        // This will be populated by the GitHub Actions workflow
        const refreshInterval = setInterval(() => {
            location.reload();
        }, 30000); // Refresh every 30 seconds
    </script>
</body>
</html>
