<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Internship Radar</title>
<style>
:root{
  --bg:#f6f7fb;--card:#ffffff;--card2:#f0f2f8;--border:#e3e6ef;
  --text:#1b1f2a;--muted:#6b7284;--accent:#3454d1;--accent2:#7c3aed;
  --green:#1a8f5c;--gold:#b5860a;--tier1:#c2410c;--tier2:#3454d1;
}
*{box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;margin:0;background:var(--bg);color:var(--text)}
.wrap{max-width:1080px;margin:0 auto;padding:20px 16px 60px}
header{padding:28px 0 18px}
h1{margin:0;font-size:28px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-block}
.sub{color:var(--muted);font-size:13px;margin-top:6px}
.brief{background:linear-gradient(135deg,#eef1fc,#f5eefc);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin:14px 0;font-size:14px;line-height:1.55;color:#2a2f3d}
.brief b.t{color:var(--accent);display:block;margin-bottom:6px;font-size:13px;text-transform:uppercase;letter-spacing:.06em}
.controls{position:sticky;top:0;z-index:5;background:linear-gradient(var(--bg) 85%,transparent);padding:12px 0 14px}
.searchrow{display:flex;gap:10px;flex-wrap:wrap}
input[type=search]{flex:1;min-width:220px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 14px;font-size:14px;outline:none}
input[type=search]:focus{border-color:var(--accent)}
select{background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 12px;font-size:13px;outline:none}
.chiprow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chiplabel{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;align-self:center;margin-right:2px}
.chip{background:var(--card);border:1px solid var(--border);border-radius:999px;color:var(--muted);padding:7px 14px;font-size:13px;cursor:pointer;user-select:none;transition:.15s}
.chip:hover{border-color:var(--accent)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.on.gold{background:var(--gold);border-color:var(--gold);color:#fff}
.count{color:var(--muted);font-size:13px;margin:14px 2px 10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 16px 14px;display:flex;flex-direction:column;gap:6px;transition:.15s;position:relative;box-shadow:0 1px 2px rgba(20,24,40,.04)}
.card:hover{border-color:var(--accent);box-shadow:0 4px 14px rgba(20,24,40,.08);transform:translateY(-1px)}
.card.tier1{border-left:4px solid var(--tier1)}
.card.tier2{border-left:4px solid var(--tier2)}
.companyrow{display:flex;align-items:center;gap:6px;padding-right:30px}
.company{font-weight:700;font-size:17px;color:var(--text);letter-spacing:-.01em}
.tiericon{font-size:13px}
.card a.title{color:var(--muted);font-weight:500;font-size:13.5px;text-decoration:none;line-height:1.4;display:block}
.card a.title:hover{color:var(--accent)}
.meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:11.5px;color:var(--muted);margin-top:4px}
.badge{border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600}
.b-new{background:rgba(26,143,92,.12);color:var(--green)}
.b-comp{background:rgba(181,134,10,.12);color:var(--gold)}
.b-job{background:rgba(52,84,209,.1);color:var(--accent)}
.b-ml{background:rgba(124,58,237,.1);color:var(--accent2)}
.b-tech{background:rgba(52,84,209,.1);color:var(--accent)}
.b-score{background:var(--card2);color:var(--muted)}
.star{position:absolute;top:14px;right:12px;background:none;border:none;font-size:20px;cursor:pointer;color:#d4d8e4;transition:.15s;padding:4px;line-height:1}
.star:hover{transform:scale(1.2)}
.star.on{color:var(--gold)}
.title-plain{color:var(--muted);font-weight:500;font-size:13.5px;line-height:1.4;display:block}
.loc-count{color:var(--accent);font-size:11.5px;font-weight:600}
.loclist{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px}
.locchip{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:2px 7px;font-size:11px;color:var(--text);text-decoration:none}
.locchip:hover{border-color:var(--accent);color:var(--accent)}
.empty{color:var(--muted);text-align:center;padding:60px 0;font-size:15px}
footer{color:var(--muted);font-size:12px;margin-top:40px;text-align:center}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>🎯 Internship Radar</h1>
  <div class="sub" id="sub">Loading…</div>
</header>
<div id="brief"></div>
<div class="controls">
  <div class="searchrow">
    <input type="search" id="q" placeholder="Search roles, companies… (e.g. ML, Palantir, Groww)">
    <select id="src"><option value="">All sources</option></select>
    <select id="sort">
      <option value="score">Sort: relevance</option>
      <option value="new">Sort: newest first</option>
      <option value="az">Sort: A–Z</option>
    </select>
  </div>
  <div class="chiprow">
    <span class="chiplabel">Role</span>
    <div class="chips">
      <span class="chip" data-f="cat:AI/ML">🧠 AI/ML</span>
      <span class="chip" data-f="cat:Tech">💻 Tech/SWE</span>
      <span class="chip" data-f="kind:job">💼 Jobs</span>
      <span class="chip" data-f="kind:competition">🏆 Competitions</span>
    </div>
  </div>
  <div class="chiprow">
    <span class="chiplabel">Location</span>
    <div class="chips">
      <span class="chip" data-f="loc:blr">📍 Bangalore</span>
      <span class="chip" data-f="loc:india">🇮🇳 India</span>
      <span class="chip" data-f="loc:remote">🌐 Remote</span>
      <span class="chip" data-f="loc:abroad">✈️ Abroad</span>
    </div>
  </div>
  <div class="chiprow">
    <span class="chiplabel">Other</span>
    <div class="chips">
      <span class="chip" data-f="tier1">🔥 Top-tier only</span>
      <span class="chip" data-f="new">✨ New today</span>
      <span class="chip gold" data-f="saved">⭐ Saved</span>
    </div>
  </div>
</div>
<div class="count" id="count"></div>
<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none"></div>
<footer>Auto-updates daily at 8:00 AM IST · scoring boosts top-tier companies + Bangalore/India/remote · edit config.json to tune</footer>
</div>
<script>
let DATA={items:[]},filters=new Set(),saved={};
try{saved=JSON.parse(localStorage.getItem('radar-saved')||'{}')}catch(e){}
const $=id=>document.getElementById(id);
const INDIA=['india','bengaluru','bangalore','mumbai','hyderabad','pune','delhi','gurgaon','gurugram','noida','chennai'];
function locClass(l){l=(l||'').toLowerCase();
  if(/bangalore|bengaluru/.test(l))return'blr';
  if(INDIA.some(k=>l.includes(k)))return'india';
  if(l.includes('remote')||l.includes('online'))return'remote';
  if(!l||l==='see post')return'other';return'abroad'}
function key(i){return (i.company||i.source)+'|||'+i.title}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function tierIcon(t){return t==='tier1'?'🔥':t==='tier2'?'⭐':''}
function groupItems(items){
  // Same company + same title posted across many cities (Palantir-style) collapses
  // into one card with an expandable location list, instead of N near-identical cards.
  const map=new Map();
  for(const i of items){
    const k=key(i);
    if(!map.has(k)){
      map.set(k,{...i,_locs:[{location:i.location,url:i.url}]});
    }else{
      const g=map.get(k);
      g._locs.push({location:i.location,url:i.url});
      g.score=Math.max(g.score,i.score);
      g.new=g.new||i.new;
      if((i.first_seen||'')>(g.first_seen||''))g.first_seen=i.first_seen;
    }
  }
  return [...map.values()];
}
function render(){
  const q=$('q').value.toLowerCase().trim(),src=$('src').value,sort=$('sort').value;
  let items=DATA.items.filter(i=>{
    if(q&&!(i.title+' '+i.company+' '+i.source+' '+i.location).toLowerCase().includes(q))return false;
    if(src&&i.source!==src)return false;
    if(filters.has('kind:job')&&i.kind!=='job')return false;
    if(filters.has('kind:competition')&&i.kind!=='competition')return false;
    if(filters.has('cat:AI/ML')&&i.category!=='AI/ML')return false;
    if(filters.has('cat:Tech')&&i.category!=='Tech')return false;
    if(filters.has('tier1')&&i.tier!=='tier1')return false;
    const lc=locClass(i.location);
    const locF=[...filters].filter(f=>f.startsWith('loc:'));
    if(locF.length&&!locF.some(f=>f==='loc:'+lc||(f==='loc:india'&&lc==='blr')))return false;
    if(filters.has('new')&&!i.new)return false;
    if(filters.has('saved')&&!saved[key(i)])return false;
    return true});
  const postingCount=items.length;
  let groups=groupItems(items);
  if(sort==='new')groups.sort((a,b)=>(b.first_seen||'').localeCompare(a.first_seen||'')||b.score-a.score);
  else if(sort==='az')groups.sort((a,b)=>(a.company||'').localeCompare(b.company||''));
  else groups.sort((a,b)=>b.score-a.score);
  $('count').textContent=groups.length+' opportunities'+(postingCount!==groups.length?` (${postingCount} postings across locations)`:'')+' of '+DATA.items.length+' total';
  $('grid').innerHTML=groups.map(g=>{
    const k=key(g),on=saved[k]?'on':'';
    const catBadge=g.category==='AI/ML'?'<span class="badge b-ml">AI/ML</span>':'<span class="badge b-tech">Tech</span>';
    const single=g._locs.length===1;
    const titleHtml=single
      ?`<a class="title" href="${esc(g._locs[0].url)}" target="_blank" rel="noopener">${esc(g.title)}</a>`
      :`<span class="title-plain">${esc(g.title)}</span><span class="loc-count">${g._locs.length} locations — click one below</span>`;
    const locsHtml=single?'':`<div class="loclist">${g._locs.map(l=>`<a href="${esc(l.url)}" target="_blank" rel="noopener" class="locchip">${esc(l.location||'—')}</a>`).join('')}</div>`;
    return `<div class="card ${g.tier==='tier1'?'tier1':g.tier==='tier2'?'tier2':''}">
      <button class="star ${on}" data-k="${esc(k)}" title="Save">★</button>
      <div class="companyrow"><span class="tiericon">${tierIcon(g.tier)}</span><span class="company">${esc(g.company||g.source)}</span></div>
      ${titleHtml}
      <div class="meta">
        ${g.new?'<span class="badge b-new">NEW</span>':''}
        <span class="badge ${g.kind==='competition'?'b-comp':'b-job'}">${g.kind==='competition'?'Competition':'Job'}</span>
        ${catBadge}
        ${single?`<span>${esc(g._locs[0].location||'—')}</span>`:''}
        <span class="badge b-score">score ${g.score}</span>
      </div>
      ${locsHtml}</div>`}).join('');
  $('empty').style.display=groups.length?'none':'block';
  $('empty').textContent=filters.has('saved')&&!groups.length?'No saved items yet — hit the ★ on any card.':'Nothing matches — clear some filters.';
  document.querySelectorAll('.star').forEach(b=>b.onclick=()=>{
    const k=b.dataset.k;if(saved[k]){delete saved[k]}else{saved[k]=1}
    localStorage.setItem('radar-saved',JSON.stringify(saved));render()});
}
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
  const f=c.dataset.f;if(filters.has(f)){filters.delete(f)}else{filters.add(f)}
  c.classList.toggle('on');render()});
$('q').oninput=render;$('src').onchange=render;$('sort').onchange=render;
fetch('data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  DATA=d;
  const jobs=d.items.filter(i=>i.kind==='job').length,comps=d.items.length-jobs,nw=d.items.filter(i=>i.new).length;
  $('sub').textContent=`Last scan: ${d.updated} · ${jobs} roles · ${comps} competitions · ${nw} new`;
  if(d.brief)$('brief').innerHTML=`<div class="brief"><b class="t">🤖 AI brief</b>${esc(d.brief).replace(/\n/g,'<br>')}</div>`;
  [...new Set(d.items.map(i=>i.source))].sort().forEach(s=>{
    const o=document.createElement('option');o.value=o.textContent=s;$('src').appendChild(o)});
  render();
}).catch(()=>{$('sub').textContent='No data yet — run the "Daily internship scan" workflow once (Actions tab), then refresh.'});
</script>
</body>
</html>
